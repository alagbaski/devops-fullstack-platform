sonar.projectKey=devops-fullstack-platform
sonar.projectName=devops-fullstack-platform
sonar.sourceEncoding=UTF-8

sonar.sources=backend,frontend/src,worker
sonar.tests=backend/tests

sonar.exclusions=**/__pycache__/**,**/.pytest_cache/**,**/.venv/**,frontend/node_modules/**,frontend/dist/**,monitoring/**,docs/**,alembic/**
sonar.coverage.exclusions=frontend/**,worker/**,alembic/**,docs/**,monitoring/**

sonar.python.version=3.10
sonar.python.coverage.reportPaths=backend/coverage.xml
