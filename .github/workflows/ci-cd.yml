name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_WORKER: ${{ github.repository }}/worker

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: ruff check backend/ worker/
    - run: black --check backend/ worker/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: |
        cd backend
        python -m pip install -r requirements-dev.txt
        pytest tests/ --cov=backend/ --cov-report=xml:coverage.xml --cov-report=html
    - uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.xml

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: |
        cd frontend
        npm ci
        npm test

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: |
        docker buildx build --platform linux/amd64 \
          -t $REGISTRY/$IMAGE_BACKEND:main \
          -f Dockerfile.backend --push .
        docker buildx build --platform linux/amd64 \
          -t $REGISTRY/$IMAGE_FRONTEND:main \
          -f frontend/Dockerfile --push .
        docker buildx build --platform linux/amd64 \
          -t $REGISTRY/$IMAGE_WORKER:main \
          -f Dockerfile.worker --push .

  sonar:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: sonarsource/sonarqube-scan-action@v1
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
