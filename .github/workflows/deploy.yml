name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      RABBITMQ_DEFAULT_USER: devops
      RABBITMQ_DEFAULT_PASS: devops
      RABBITMQ_ERLANG_COOKIE: ci-rabbit-cookie
      RABBITMQ_URL: amqp://devops:devops@rabbitmq:5672//
      JWT_SECRET: ci-only-jwt-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required runtime environment
        run: bash ./scripts/validate-env.sh

      - name: Validate Compose file
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Start application stack
        run: docker compose up -d

      - name: Wait for core services
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8000/health >/dev/null && curl --fail --silent http://localhost/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready in time"
          docker compose ps
          exit 1

      - name: Verify running services
        run: docker compose ps

      - name: Build frontend production bundle
        run: docker compose exec -T frontend npm run build

      - name: Run application smoke test
        env:
          BASE_URL: http://localhost
        run: ./scripts/smoke-phase1.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend test dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: pytest --cov=. --cov-report=xml:coverage.xml tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run backend lint checks
        working-directory: backend
        run: ruff check .

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
